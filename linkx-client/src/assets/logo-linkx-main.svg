  <!-- Interlocking links -->
  <g transform="translate(36 36)" fill="none" stroke="#fff" stroke-width="4.2" stroke-linecap="round">
    <ellipse rx="14.5" ry="6.9" transform="rotate(-42)"/>
    <ellipse rx="14.5" ry="6.9" transform="rotate(42)"/>
  </g>
  <!-- Wordmark -->
  <text
