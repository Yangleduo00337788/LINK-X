# 测试环境配置
server:
  port: 0  # 随机端口，避免冲突

spring:
  application:
    name: linkx-server-test
  profiles:
    active: test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;INIT=RUNSCRIPT FROM 'classpath:schema-test.sql'
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      schema-locations: classpath:schema-test.sql
      mode: always
  data:
    redis:
      host: localhost
      port: 6379
      database: 1  # 使用不同的数据库避免污染

  # H2 Console 配置（仅在测试中使用）
  h2:
    console:
      enabled: true
      path: /h2-console

# JWT 配置 - 测试用密钥
linkx:
  jwt:
    secret: test-secret-key-for-jwt-generation-at-least-32-chars-long-key
    access-expire: 7200000
    refresh-expire: 604800000
  auth:
    captcha-enabled: false  # 测试环境关闭验证码
    login-max-attempts: 5
    lock-duration-minutes: 15
    rate-limit-login-per-minute: 10
    rate-limit-register-per-minute: 5
  cors:
    allowed-origins:
      - http://localhost:5173
  security:
    require-https: false
  im:
    websocket-port: 8081

# 日志配置
logging:
  level:
    com.linkx.server: DEBUG
    org.springframework.security: DEBUG
