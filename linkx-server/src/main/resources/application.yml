server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: linkx-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/linkx?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      database: 0

mybatis-flex:
  mapper-locations: classpath:mapper/*.xml
  global-config:
    logic-delete-column: deleted
    print-banner: false

linkx:
  jwt:
    secret: ${JWT_SECRET}
    access-expire: 7200000
    refresh-expire: 604800000
  auth:
    captcha-enabled: ${CAPTCHA_ENABLED:false}
    login-max-attempts: 5
    lock-duration-minutes: 15
    rate-limit-login-per-minute: 10
    rate-limit-register-per-minute: 5
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
  security:
    require-https: ${REQUIRE_HTTPS:false}
  im:
    websocket-port: 8081
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin123}
    bucket-name: ${MINIO_BUCKET_NAME:linkx}
    max-file-size: 10485760  # 10MB

# Actuator 健康检查与指标配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  health:
    db:
      enabled: true
    redis:
      enabled: true
  info:
    env:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true

# SpringDoc OpenAPI 配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
  show-actuator: false

logging:
  level:
    root: info
    com.linkx.server: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
