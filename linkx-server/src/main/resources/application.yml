server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: linkx-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/linkx?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      database: 0

mybatis-flex:
  mapper-locations: classpath:mapper/*.xml
  global-config:
    logic-delete-column: deleted
    print-banner: false

linkx:
  jwt:
    secret: ${JWT_SECRET}
    access-expire: 7200000
    refresh-expire: 604800000
  auth:
    captcha-enabled: ${CAPTCHA_ENABLED:false}
    login-max-attempts: 5
    lock-duration-minutes: 15
    rate-limit-login-per-minute: 10
    rate-limit-register-per-minute: 5
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
  security:
    require-https: ${REQUIRE_HTTPS:false}
  im:
    websocket-port: 8081
  minio:
    endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin123}
    bucket-name: ${MINIO_BUCKET_NAME:linkx}
    max-file-size: 10485760  # 10MB
  mail:
    # QQ 邮箱 SMTP 服务器
    host: ${MAIL_HOST:smtp.qq.com}
    # 587 端口走 STARTTLS；465 端口走 SSL
    port: ${MAIL_PORT:587}
    # QQ 邮箱账号（完整的邮箱地址）
    username: ${MAIL_USERNAME:liming743258831@qq.com}
    # QQ 邮箱授权码（非登录密码，需要在 QQ 邮箱「设置→账户→SMTP服务」开启后生成）
    password: ${MAIL_PASSWORD:ogunqofycyvbbejf}
    # 发件人邮箱与显示名称（建议与 username 一致）
    from: ${MAIL_FROM:liming743258831@qq.com}
    from-name: ${MAIL_FROM_NAME:LinkX}
    # STARTTLS 加密（587 端口必须为 true）
    start-tls: ${MAIL_START_TLS:true}
    # SSL 加密开关（仅 465 端口需要设为 true）
    ssl: ${MAIL_SSL:false}
    code-expire-minutes: ${MAIL_CODE_EXPIRE_MINUTES:10}
  app:
    # 应用自身版本，供"检查更新"接口使用
    version: ${APP_VERSION:1.0.0}
    channel: ${APP_CHANNEL:stable}
    release-notes: ${APP_RELEASE_NOTES:本次更新优化了若干已知问题，建议升级。}
    download-url: ${APP_DOWNLOAD_URL:}

# Actuator 健康检查与指标配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  health:
    db:
      enabled: true
    redis:
      enabled: true
  info:
    env:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true

# SpringDoc OpenAPI 配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
  show-actuator: false

logging:
  level:
    root: info
    com.linkx.server: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
