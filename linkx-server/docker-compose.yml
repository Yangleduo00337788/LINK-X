version: '3.8'

services:
  mysql:
    image: mysql:8.4.0
    container_name: linkx-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: linkx_password
      MYSQL_DATABASE: linkx
      TZ: Asia/Shanghai
    command: 
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - ./docker/mysql/data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./migrations:/docker-entrypoint-initdb.d/migrations:ro
    restart: always

  redis:
    image: redis:7.2.4
    container_name: linkx-redis
    ports:
      - "6379:6379"
    environment:
      TZ: Asia/Shanghai
    command: redis-server --requirepass linkx_redis_password --appendonly yes
    volumes:
      - ./docker/redis/data:/data
    restart: always

  minio:
    image: minio/minio:RELEASE.2024-05-10T01-41-38Z
    container_name: linkx-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
      TZ: Asia/Shanghai
    command: server /data --console-address ":9001"
    volumes:
      - ./docker/minio/data:/data
    restart: always
