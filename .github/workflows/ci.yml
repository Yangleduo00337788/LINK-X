name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linkx-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Test + JaCoCo
        run: mvn -B verify
      - name: Upload JaCoCo
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: |
            linkx-server/target/site/jacoco
            linkx-server/target/site/jacoco-biz

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linkx-client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: linkx-client/package-lock.json
      - run: npm ci
      - name: Unit tests with coverage gate
        run: npm run test:coverage
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-coverage
          path: linkx-client/coverage
